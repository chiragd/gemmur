name: Gemmur
options:
  bundleIdPrefix: com.antigravity
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    exactVersion: "2.25.6"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    exactVersion: "0.25.6"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.gemmur
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      ENABLE_HARDENED_RUNTIME: NO
      CODE_SIGN_IDENTITY: "-"

targets:
  Gemmur:
    type: application
    platform: macOS
    sources:
      - path: Gemmur
    info:
      path: Gemmur/Info.plist
      properties:
        CFBundleDisplayName: Gemmur
        CFBundleIconFile: AppIcon
        LSUIElement: true
        NSMicrophoneUsageDescription: "Gemmur needs the microphone to capture your speech for transcription."
        NSAccessibilityUsageDescription: "Gemmur needs Accessibility access to insert transcribed text into other apps."
        NSAppleEventsUsageDescription: "Gemmur uses System Events to paste transcribed text into apps like Chrome and Terminal."
        LSApplicationCategoryType: public.app-category.productivity
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Gemmur
